<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <title>Pflanzen Überwachung</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/styles.css" />
    <script src="js/script.js"></script>
  </head>
  <body class>
    <h1>Pflanzen Überwachungs System</h1>
    <p class="authoren">Von Thorben Hutter</p>

    <button
      onclick="dark_mode()"
      style="position: absolute; top: 20px; left: 50px; padding: 10px 15px">
      Toggle dark mode
    </button>
    <button
      onclick="openJSON()"
      style="position: absolute; top: 80px; left: 50px; padding: 10px 15px">
      JSON öffnen
    </button>
    <button
      onclick="openXML()"
      style="position: absolute; top: 140px; left: 50px; padding: 10px 15px">
      XML öffnen
    </button>

    <p class="daten">Time: <span id="zeit">...</span></p>
    <p class="daten">Bodenfeuchte: <span id="boden">...</span></p>
    <p class="daten">Temperatur SHT30: <span id="temp_sht">...</span></p>
    <p class="daten">Luftfeuchte SHT30: <span id="luft_sht">...</span></p>
    <p class="daten">Temperatur Sensor: <span id="temp_sen">...</span></p>

    <script>
      updateData(); // lädt 1x sofort
      setInterval(updateData, 10000); // danach alle 10 Sekunden
    </script>
  </body>
</html>
