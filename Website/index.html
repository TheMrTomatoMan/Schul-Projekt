<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <title>Controlpanel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body class>
    <h1>Project X</h1>
    <p>Hallo</p>
    <button onclick="dark_mode()">Toggle dark mode</button>
    <script>
      function dark_mode() {
        var element = document.body;
        element.classList.toggle("dark-mode");
      }
    </script>

    <p>Bodenfeuchte: <span id="boden">...</span></p>
    <p>Temperatur SHT30: <span id="temp_sht">...</span></p>
    <p>Luftfeuchte SHT30: <span id="luft_sht">...</span></p>
    <p>Temperatur Sensor: <span id="temp_sen">...</span></p>

    <script>
      function updateData() {
        fetch("/data")
          .then(function (response) {
            return response.json();
          })
          .then(function (data) {
            document.getElementById("boden").innerText =
              data["Boden Feuchtigkeit"];
            document.getElementById("temp_sht").innerText =
              data["Temperatur von SHT30"];
            document.getElementById("luft_sht").innerText =
              data["Luftfeuchte von SHT30"];
            document.getElementById("temp_sen").innerText =
              data["Temeratur von Sensor"];
          });
      }

      updateData(); // lädt 1x sofort
      setInterval(updateData, 10000); // danach alle 10 Sekunden
    </script>
  </body>
</html>
